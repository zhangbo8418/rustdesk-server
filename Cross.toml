# OpenSSL dev libs for `cross build` (links openssl-sys to system OpenSSL).
# On Linux, hbb_common also enables `openssl/vendored` as a fallback when these are absent.
[target.x86_64-unknown-linux-gnu]
pre-build = [
    "apt-get update",
    "DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libssl-dev ca-certificates",
]

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "apt-get update",
    "DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libssl-dev ca-certificates",
]

[target.armv7-unknown-linux-gnueabihf]
pre-build = [
    "apt-get update",
    "DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libssl-dev ca-certificates",
]
